# PLACEHOLDER_REQUIRES_VALIDATION: make an external frozen copy after the
# independent 8K sweep and replace every interval/order null. The runner must
# reject this unresolved template.
schema_version: pixarc-taylorseer-config-v1
checkpoint: ../../../checkpoints/PixelGen_XL_160ep.ckpt
taylorseer:
  mode: taylorseer
  interval: null
  max_order: null
  first_enhance: 2
  coordinate_mode: official_nfe_index
  force_last_full: false
  cache_dtype: inherit
  trace_mode: summary
runtime:
  batch_size: 4
  precision: bf16-mixed
  compile_mode: matched_eager
  num_workers: 1
  noise_scale: 1.0
seed_everything: 1234
trainer:
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: bf16-mixed
  logger: false
  inference_mode: true
  use_distributed_sampler: false
model:
  compile_mode: matched_eager
  vae:
    class_path: src.models.autoencoder.pixel.PixelAE
    init_args: {scale: 1.0}
  denoiser:
    class_path: taylorseer_style.pixelgen_model.TaylorSeerPixelGenJiT
    init_args:
      input_size: 256
      patch_size: 16
      in_channels: 3
      hidden_size: 1152
      depth: 28
      num_heads: 16
      mlp_ratio: 4.0
      attn_drop: 0.0
      proj_drop: 0.1
      num_classes: 1000
      use_bottleneck: false
      in_context_len: 32
      in_context_start: 8
      taylorseer_mode: taylorseer
      taylorseer_interval: null
      taylorseer_max_order: null
      taylorseer_first_enhance: 2
      taylorseer_coordinate_mode: official_nfe_index
      taylorseer_force_last_full: false
      taylorseer_cache_dtype: inherit
      taylorseer_trace_mode: summary
      compile_mode: matched_eager
  conditioner:
    class_path: src.models.conditioner.class_label.LabelConditioner
    init_args: {num_classes: 1000}
  diffusion_trainer:
    class_path: taylorseer_style.pixelgen_lightning.InferenceOnlyTrainer
    init_args: {}
  diffusion_sampler:
    class_path: taylorseer_style.pixelgen_sampler.TaylorSeerHeunSamplerJiT
    init_args:
      exact_henu: true
      num_steps: 50
      guidance: 2.25
      timeshift: 2.0
      guidance_interval_min: 0.1
      guidance_interval_max: 0.9
      scheduler: src.diffusion.flow_matching.scheduling.LinearScheduler
      w_scheduler: src.diffusion.flow_matching.scheduling.LinearScheduler
      guidance_fn: src.diffusion.base.guidance.simple_guidance_fn
      step_fn: src.diffusion.flow_matching.sampling.ode_step_fn
  ema_tracker:
    class_path: src.callbacks.simple_ema.SimpleEMA
    init_args: {decay: 0.9999}
  optimizer:
    class_path: torch.optim.AdamW
    init_args: {lr: 0.0001, weight_decay: 0.0}
data:
  train_dataset: null
  eval_dataset: null
  pred_dataset: null
  train_batch_size: 4
  train_num_workers: 1
  pred_batch_size: 4
  pred_num_workers: 1

