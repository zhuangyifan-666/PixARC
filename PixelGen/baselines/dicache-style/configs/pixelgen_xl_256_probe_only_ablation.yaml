# probe_only_ablation mode; GPU execution remains deferred.
schema_version: pixarc-dicache-config-v1
checkpoint: ../../../checkpoints/PixelGen_XL_160ep.ckpt
dicache:
  mode: probe_only_ablation
  profile: flux_image_released
  probe_depth: 1
  error_choice: delta_y
  rel_l1_thresh: null
  ret_ratio: 0.2
  gamma_min: 1.0
  gamma_max: 1.5
  warmup_semantics: flux_inclusive
  gate_mode: batch_global
  threshold_compare: strict_less_for_reuse
  probe_token_scope: image_tokens
  dcta_order: 1
  residual_anchor_count: 2
  numeric_mode: official_no_epsilon
  epsilon: 1.0e-8
  nonfinite_policy: official_compare
  gamma_nonfinite_policy: official_propagate
  force_last_full: true
  cache_dtype: inherit
  trace_mode: full
runtime:
  protocol: sample_adaptive
  batch_size: 1
  effective_cfg_batch_size: 2
  precision: bf16-mixed
  compile_mode: matched_eager
  num_workers: 1
  noise_scale: 1.0
seed_everything: 1234
trainer:
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: bf16-mixed
  logger: false
  inference_mode: true
  use_distributed_sampler: false
model:
  compile_mode: matched_eager
  vae:
    class_path: src.models.autoencoder.pixel.PixelAE
    init_args: {scale: 1.0}
  denoiser:
    class_path: dicache_style.pixelgen_model.DiCachePixelGenJiT
    init_args:
      input_size: 256
      patch_size: 16
      in_channels: 3
      hidden_size: 1152
      depth: 28
      num_heads: 16
      mlp_ratio: 4.0
      attn_drop: 0.0
      proj_drop: 0.1
      num_classes: 1000
      use_bottleneck: false
      in_context_len: 32
      in_context_start: 8
      dicache_mode: probe_only_ablation
      dicache_profile: flux_image_released
      dicache_probe_depth: 1
      dicache_error_choice: delta_y
      dicache_rel_l1_thresh: null
      dicache_ret_ratio: 0.2
      dicache_gamma_min: 1.0
      dicache_gamma_max: 1.5
      dicache_force_last_full: true
      dicache_numeric_mode: official_no_epsilon
      dicache_epsilon: 1.0e-8
      dicache_nonfinite_policy: official_compare
      dicache_gamma_nonfinite_policy: official_propagate
      dicache_gate_mode: batch_global
      dicache_cache_dtype: inherit
      dicache_trace_mode: full
      compile_mode: matched_eager
  conditioner:
    class_path: src.models.conditioner.class_label.LabelConditioner
    init_args: {num_classes: 1000}
  diffusion_trainer:
    class_path: dicache_style.pixelgen_lightning.InferenceOnlyTrainer
    init_args: {}
  diffusion_sampler:
    class_path: dicache_style.pixelgen_sampler.DiCacheHeunSamplerJiT
    init_args:
      exact_henu: true
      num_steps: 50
      guidance: 2.25
      timeshift: 2.0
      guidance_interval_min: 0.1
      guidance_interval_max: 0.9
      scheduler: src.diffusion.flow_matching.scheduling.LinearScheduler
      w_scheduler: src.diffusion.flow_matching.scheduling.LinearScheduler
      guidance_fn: src.diffusion.base.guidance.simple_guidance_fn
      step_fn: src.diffusion.flow_matching.sampling.ode_step_fn
  ema_tracker:
    class_path: src.callbacks.simple_ema.SimpleEMA
    init_args: {decay: 0.9999}
  optimizer:
    class_path: torch.optim.AdamW
    init_args: {lr: 0.0001, weight_decay: 0.0}
data:
  train_dataset: null
  eval_dataset: null
  pred_dataset: null
  train_batch_size: 1
  train_num_workers: 1
  pred_batch_size: 1
  pred_num_workers: 1
