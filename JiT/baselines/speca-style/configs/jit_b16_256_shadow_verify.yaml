schema_version: pixarc-speca-config-v1
model:
  variant: JiT-B/16
  checkpoint: ../../../checkpoints/JiT-B-16-256/checkpoint-last.pth
  image_size: 256
  num_classes: 1000
  ema: model_ema1
  args: {attn_dropout: 0.0, proj_dropout: 0.0}
sampling:
  method: heun
  steps: 50
  exact_heun: true
  cfg_scale: 3.0
  guidance_interval: [0.1, 1.0]
  noise_scale: 1.0
  dtype: bfloat16
speca:
  mode: shadow_verify
  scheduler_mode: released_code_faithful
  interval: null
  max_order: 4
  base_threshold: 0.3
  decay_rate: 0.05
  min_taylor_steps: 3
  max_taylor_steps: 8
  first_enhance: 3
  threshold_floor: 0.01
  error_metric: relative_l1
  error_eps: 1.0e-10
  verify_layer: -1
  verification_token_scope: all_tokens
  gate_mode: batch_global
  coordinate_mode: official_nfe_index
  force_last_full: false
  cache_dtype: inherit
  trace_mode: shadow
runtime: {batch_size: 1, compile_mode: matched_eager}
