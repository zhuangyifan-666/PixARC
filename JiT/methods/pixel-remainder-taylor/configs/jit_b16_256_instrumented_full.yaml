schema_version: pixarc-pixel-remainder-taylor-v1
model:
  variant: JiT-B/16
  checkpoint: ../../../checkpoints/JiT-B-16-256/checkpoint-last.pth
  image_size: 256
  num_classes: 1000
  ema: model_ema1
  args: {attn_dropout: 0.0, proj_dropout: 0.0}
sampling:
  method: heun
  steps: 50
  exact_heun: true
  cfg_scale: 3.0
  guidance_interval: [0.1, 1.0]
  noise_scale: 1.0
  dtype: bfloat16
method:
  mode: instrumented_full
  tau: 0.0
  max_taylor_span: 3
  stored_feature_order: 2
  pixel_max_order: 3
  warmup_full_nfe: 3
  pool_kernel: 8
  batch_reduction: mean
  cache_dtype: inherit
  trace_mode: full
runtime: {batch_size: 32, compile_mode: matched_eager}
